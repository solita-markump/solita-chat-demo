services:
  postgres:
    image: postgres:16-alpine
    container_name: solita-chat-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - solita-chat-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  solita-chat-postgres-data:
